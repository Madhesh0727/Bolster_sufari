services:
  - type: web
    name: bolstersafari-backend
    env: python
    region: ohio
    plan: free
    rootDir: bolstersafari_django
    buildCommand: "pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py setup_admin"
    startCommand: "gunicorn bolstersafari.wsgi --log-file -"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: "bolstersafari.settings.production"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "bolstersafari-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://bolstersafari-frontend.onrender.com"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DISABLE_REDIS
        value: "1"
