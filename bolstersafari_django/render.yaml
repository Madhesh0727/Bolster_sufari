services:
  - type: web
    name: bolstersafari-backend
    env: python
    region: ohio # Adjust based on preference
    plan: free
    rootDir: bolstersafari_django
    buildCommand: "./build.sh"
    startCommand: "gunicorn bolstersafari.wsgi --log-file -"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: "bolstersafari.settings.production"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "bolstersafari-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://bolstersafari-frontend.onrender.com" # Update this to the actual frontend URL later
      - key: SUPABASE_URL
        sync: false # Requires manual entry in dashboard
      - key: SUPABASE_KEY
        sync: false # Requires manual entry in dashboard
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DISABLE_REDIS
        value: "1" # Important for free plan which doesn't include Redis
